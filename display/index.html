<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
    <style>
        span{
            border: 1px solid black;
            width: 100px;
            height: 100px;
            display: inline;
        }

        ul li{
            display: inline-block;
            margin: 0px 20px;
        }
        /* a{
            text-decoration: none;
            display: block;
        } */

        a{
            width: 100px;
            border: 1px solid black;
            padding: 10px;
            display: inline-block;
        }
        .box{
            width: 500px;
            height: 500px;
            background-color: orange;
            position: relative;
        }
        .box-1{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            top:0px;
        }
        .box-2{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            bottom:0px;
        }
        .box-3{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            right:0px;
        }
        .box-4{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            right:0px;
            bottom: 0;
        }
        .box-5{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            top:100px;
            left: 100px;
        }
    </style>
</head>
<body>

    
    <div class="box">
        <div class="box-1"></div>
        <div class="box-2"></div>
        <div class="box-3"></div>
        <div class="box-4"></div>
        <div class="box-5"></div>



    </div>



    <span>hiii</span>
    <span>hello</span>


    <ul>
        <li>
            <a href="#">Hello</a>
        </li>
         <li>
            <a href="#">About</a>
        </li>
         <li>
            <a href="#">contact</a>
        </li>
         <li>
            <a href="#">product</a>
        </li>
    </ul>


    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>


</body>
</html>
