<html>
   <head>
     <title>form</title>
   </head>
 <body>
    <form>
	<label> Name:-</label>
	<input type="name" placeholder="Enter your name"/>
	<br/><br/>
	<label> Password:-</label>
	<input type="Password" placeholder="Enter Password"/>
	<br/><br>
	<label> Email:-</label>
	<input type="email" placeholder="Enter email"/>
	<br/><br>
	<label> Number:-</label>
	<input type="number" min="0" max="10"/>
	<br/><br>
	<label> Telephone:-</label>
	<input type="tel" placeholder="enter your phone number"/>
	<br/><br>
	<label> Url:-</label>
	<input type="Url" placeholder="enter your url"/>
	<br/><br>
	<label> Date:-</label>
	<input type="Date"/>
	<br/><br>
	<label> Datetime-local:-</label>
	<input type="Datetime-local"/>
	<br/><br>
	<label> Month:-</label>
	<input type="month"/>
	<br/><br>
	<label> Week:-</label>
	<input type="week"/>
	<br/><br>
	<label> Time:-</label>
	<input type="time"/>
	<br/><br>
	<label> Radio:-</label>
	<input type="radio" name="gender"/>Male
	<input type="radio" checked name="gender"/>Female
	<br/><br/>
	<label> Hobby:-</label>
	<input type="checkbox" />cooking
	<input type="checkbox" />travelling
	<br/><br>
	
	<label> Range:-</label>
	<input type="range" min="0" mix="100" />
	<br/><br>
	
	<label> Color:-</label>
	<input type="color"/>
	<br/><br>
	
	<label> File:-</label>
	<input type="file"/>
	<br/><br>
	<label>Hidden:-</label>
	<input type="hidden" value="12345"/>
	<br/><br>
	
	
	<input type="submit" />
	<input type="reset" />
	<br/><br>
	<label>Search:-</label>
	<input type="search" placeholder="search"/>
	<br/><br>
	</form>
  
  
  
  
 </body>
</html>
